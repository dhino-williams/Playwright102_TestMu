version: 0.1
runson: win

# Secrets from LambdaTest Dashboard
env:
  LT_USERNAME: ${secret.LT_USERNAME}
  LT_ACCESS_KEY: ${secret.LT_ACCESS_KEY}

pre:
  - npm ci

matrix:
  os: [win, linux]
  browser: [chrome, firefox]

# Move the test command to the root level
test:
  - npx playwright test

# Artifacts for the assignment
artifacts:
  path:
    - playwright-report/
    - test-results/
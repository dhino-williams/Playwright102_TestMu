version: 0.1
runson: win

env:
  LT_USERNAME: ${secret.LT_USERNAME}
  LT_ACCESS_KEY: ${secret.LT_ACCESS_KEY}

pre:
  - npm ci

matrix:
  os: [win, linux]
  browser: [chrome, firefox]

# Force execution from the root
test:
  - npx playwright test

artifacts:
  path:
    - playwright-report/
    - test-results/
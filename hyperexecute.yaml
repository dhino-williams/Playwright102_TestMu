version: 0.1
runson: win

env:
  LT_USERNAME: ${secret.LT_USERNAME}
  LT_ACCESS_KEY: ${secret.LT_ACCESS_KEY}

pre:
  - npm ci

matrix:
  os: [win, linux]
  browser: [chrome, firefox]

# Force HyperExecute to discover tests in the 'tests' directory
testDiscovery:
  type: raw
  mode: local
  command: npx playwright test --list

# Execute the discovered tests
test:
  - npx playwright test

artifacts:
  path:
    - playwright-report/
    - test-results/